<!DOCTYPE html>
<html>
<head>
    <title>LeadIntel Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a1a2e;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 16px;
        }
        .login-link {
            text-align: center;
            margin-top: 16px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>Register Agency</h1>
        <input type="text" id="agencyName" placeholder="Agency Name">
        <input type="text" id="subdomain" placeholder="Subdomain (e.g., myagency)">
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <div id="error" class="error"></div>
        <div class="login-link">
            <a href="/login">Already have an account? Login</a>
        </div>
    </div>

    <script>
        async function register() {
            const name = document.getElementById('agencyName').value;
            const subdomain = document.getElementById('subdomain').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            errorDiv.textContent = '';
            
            try {
                const response = await fetch('/api/agencies/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, subdomain, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Auto login after registration
                    const loginResponse = await fetch('/api/agencies/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const loginData = await loginResponse.json();
                    localStorage.setItem('access_token', loginData.access_token);
                    localStorage.setItem('user', JSON.stringify(loginData.user));
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = data.detail || 'Registration failed';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error';
            }
        }
    </script>
</body>
</html>
