services:
  - type: web
    name: leadintel
    runtime: python
    repo: https://github.com/arambamaditya-svg/leadintel
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false